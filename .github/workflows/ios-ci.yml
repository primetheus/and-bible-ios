name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ios-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repo-standards:
    name: Repo Standards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run repo standards unit tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py'

      - name: Check commit messages (pull request range)
        if: github.event_name == 'pull_request'
        run: >-
          python3 scripts/check_repo_standards.py commits
          --base-ref "origin/${{ github.base_ref }}"
          --head-ref HEAD

      - name: Check commit messages (push head commit)
        if: github.event_name == 'push'
        run: python3 scripts/check_repo_standards.py commits

      - name: Check Swift docblock style (full repo on pull request)
        if: github.event_name == 'pull_request'
        run: >-
          python3 scripts/check_repo_standards.py docblocks
          --base-ref "origin/${{ github.base_ref }}"
          --head-ref HEAD
          --all-files

      - name: Check Swift docblock style (full repo on push)
        if: github.event_name == 'push'
        run: python3 scripts/check_repo_standards.py docblocks --all-files

  localization-guardrails:
    name: Localization Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run SETPAR-603 guardrails
        run: python3 scripts/check_settings_localization_guardrails.py

  ios-build-and-test:
    name: Build And Test (Simulator, Unit + UI)
    runs-on: macos-15
    needs:
      - repo-standards
      - localization-guardrails
    timeout-minutes: 90
    env:
      DERIVED_DATA_PATH: .derivedData
      BUILD_XCRESULT_BUNDLE_PATH: .artifacts/AndBibleBuild.xcresult
      TEST_XCRESULT_BUNDLE_PATH: .artifacts/AndBibleTests.xcresult
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: '16.4'

      - name: Restore SwiftPM and build caches
        uses: actions/cache@v5
        with:
          path: |
            .derivedData/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-xcode-spm-${{ hashFiles('Package.swift', 'AndBible.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-spm-

      - name: Restore libsword build cache
        uses: actions/cache@v5
        with:
          path: |
            libsword/sword-src
            libsword/build
            libsword/libsword.xcframework
          key: ${{ runner.os }}-xcode-16.4-libsword-${{ hashFiles('libsword/build-ios.sh') }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Ensure iOS simulator runtime is available
        run: |
          if xcrun simctl list runtimes available | grep -Fq 'iOS '; then
            echo "An iOS simulator runtime is already installed."
          else
            echo "No iOS simulator runtime was found; downloading it for the selected Xcode."
            xcodebuild -downloadPlatform iOS
          fi

      - name: Ensure libsword build prerequisites
        run: |
          if ! command -v cmake >/dev/null 2>&1; then
            brew install cmake
          fi
          if ! command -v svn >/dev/null 2>&1; then
            brew install subversion
          fi

      - name: Build libsword XCFramework
        working-directory: libsword
        env:
          INCLUDE_MACOS_SLICE: "0"
        run: |
          if [ -f libsword.xcframework/Info.plist ] && find libsword.xcframework -name libsword.a -print -quit | grep -q .; then
            echo "Using cached libsword.xcframework"
          else
            ./build-ios.sh
          fi

      - name: Resolve iOS simulator destination
        id: simulator
        run: python3 scripts/resolve_ios_simulator_destination.py --project AndBible.xcodeproj --scheme AndBible

      - name: Boot selected simulator
        run: >-
          python3 scripts/wait_for_simulator_boot.py
          --simulator-id "${{ steps.simulator.outputs.simulator_id }}"
          --timeout-seconds 300

      - name: Build for testing
        run: >-
          mkdir -p .artifacts &&
          xcodebuild
          -project AndBible.xcodeproj
          -scheme AndBible
          -configuration Debug
          -destination "${{ steps.simulator.outputs.destination }}"
          -derivedDataPath "${DERIVED_DATA_PATH}"
          -resultBundlePath "${BUILD_XCRESULT_BUNDLE_PATH}"
          CODE_SIGNING_ALLOWED=NO
          build-for-testing

      - name: Run simulator tests without rebuilding
        run: >-
          xcodebuild
          -project AndBible.xcodeproj
          -scheme AndBible
          -configuration Debug
          -destination "${{ steps.simulator.outputs.destination }}"
          -derivedDataPath "${DERIVED_DATA_PATH}"
          -resultBundlePath "${TEST_XCRESULT_BUNDLE_PATH}"
          CODE_SIGNING_ALLOWED=NO
          test-without-building

      - name: Upload xcodebuild test result bundle
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: andbible-xcresult-${{ github.run_id }}
          path: .artifacts/*.xcresult
          if-no-files-found: warn
          retention-days: 14
